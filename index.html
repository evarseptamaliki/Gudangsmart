<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Gudang Emon Pro</title>

<link rel="stylesheet"
href="style.css">

<link rel="manifest"
href="manifest.json">

<meta name="theme-color"
content="#2563eb">

</head>

<body>

<!-- LOGIN -->

<div id="loginPage"
style="display:none;">

<div class="login-box">

<h1>

<img src="foto/emon.jpg" width="200">Gudang Emon

</h1>

<input
type="text"
id="username"
placeholder="Username">

<div class="password-box">

<input
type="password"
id="password"
placeholder="Password">

<button
onclick="togglePassword()">

👁️

</button>

</div>

<button onclick="login()">

Login

</button>

</div>

</div>



<!-- DASHBOARD -->

<div id="dashboard">

<button
id="adminBtn"
onclick="bukaLogin()">

🔐 Masuk Admin

</button>

<header>

<h2>

Gudang Emon Pro

</h2>

<div>

<button onclick="toggleDark()">

🌙

</button>

<button onclick="logout()">

Logout

</button>

</div>

</header>



<!-- KARTU -->

<div class="cards">

<div class="card">

<h3>

Jenis Barang

</h3>

<h2 id="jumlahBarang">

0

</h2>

</div>



<div class="card">

<h3>

Total Stok

</h3>

<h2 id="totalStok">

0

</h2>

</div>



<div class="card">

<h3>

Masuk

</h3>

<h2 id="barangMasuk">

0

</h2>

</div>



<div class="card">

<h3>

Keluar

</h3>

<h2 id="barangKeluar">

0

</h2>

</div>



<div class="card"
id="stokMenipis">

<h3>

⚠ Stok Menipis

</h3>

<div id="peringatanStok">

Semua stok aman

</div>

</div>

</div>



<!-- FORM -->

<div class="form-box">

<input
id="nama"
placeholder="Nama Barang">

<input
id="warna"
placeholder="Warna">

<input
id="stok"
type="number"
placeholder="Stok">

<input
id="lokasi"
placeholder="Lokasi">

<select id="jenis">

<option>

Masuk

</option>

<option>

Keluar

</option>

</select>



<button
onclick="tambah()">

Tambah

</button>



<button
onclick="exportCSV()">

📄 Export Excel

</button>

</div>



<!-- SEARCH -->

<div class="search-box">

<input

id="search"

placeholder="Cari barang..."

onkeyup="render()">

</div>



<!-- TABEL -->

<div class="table-box">

<table>

<thead>

<tr>

<th>No</th>

<th>Nama</th>

<th>Warna</th>

<th>Stok</th>

<th>Lokasi</th>

<th>Aksi</th>

</tr>

</thead>



<tbody id="tbody">

</tbody>

</table>

</div>



<!-- RIWAYAT -->

<h3>

📜 Riwayat Barang

</h3>

<div class="table-box">

<table>

<thead>

<tr>

<th>Tanggal</th>

<th>Nama</th>

<th>Warna</th>

<th>Jumlah</th>

<th>Status</th>

</tr>

</thead>



<tbody id="riwayatBody">

</tbody>

</table>

</div>

</div>



<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<script src="script.js"></script>

</body>

</html>
